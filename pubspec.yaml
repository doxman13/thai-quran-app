name: thai_quran_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  path_provider: ^2.1.3
  scrollable_positioned_list: ^0.3.8
  google_fonts: ^8.1.0
  http: ^1.6.0
  supabase_flutter: ^2.8.0
  flutter_svg: ^2.0.10
  qcf_quran: ^0.0.5
  url_launcher: ^6.3.0
  timeago: ^3.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/quran_tajweed.json
    - assets/thai_v3.json
    - assets/merged_quran.json
    - assets/tafsir_thai_mokhtasar.json
    - assets/icons/playstore-icon.png
    - assets/quran_arabic.json
    - assets/Bismillah_Calligraphy6.svg
    - assets/reconciled_thai_quran_themes.json
    - assets/surah_summary_th_exact.json

  fonts:
    - family: UthmanicHafs
      fonts:
        - asset: assets/fonts/UthmanicHafs.ttf
